<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 · 迷失了</title>
    <meta name="robots" content="noindex">
    <meta name="theme-color" content="#07070b">
    <style>
        *{box-sizing:border-box;margin:0;padding:0}
        :root{
            --accent:#ff8fb6;--accent-2:#ffc5d8;--accent-3:#ff6b9d;
            --ease:cubic-bezier(.22,.61,.36,1);
            --spring:cubic-bezier(.34,1.45,.5,1);
        }
        body{
            min-height:100vh;display:flex;align-items:center;justify-content:center;
            background:#07070b;color:#fff8fc;overflow:hidden;
            font-family:'Noto Sans JP','PingFang SC',-apple-system,sans-serif;
            position:relative;
        }
        /* 背景光晕 */
        body::before{
            content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
            background:
                radial-gradient(ellipse 60% 50% at 30% 40%,rgba(255,143,182,.08),transparent 60%),
                radial-gradient(ellipse 50% 40% at 70% 60%,rgba(196,78,255,.06),transparent 60%);
        }
        /* 浮动光圈 */
        .orb{position:fixed;border-radius:50%;filter:blur(60px);z-index:0;pointer-events:none;mix-blend-mode:screen}
        .orb-1{width:400px;height:400px;background:radial-gradient(circle,rgba(255,143,182,.15),transparent 70%);top:-10%;left:-5%;animation:orbFloat1 14s ease-in-out infinite}
        .orb-2{width:350px;height:350px;background:radial-gradient(circle,rgba(255,107,157,.12),transparent 70%);bottom:-10%;right:-5%;animation:orbFloat2 18s ease-in-out infinite}
        @keyframes orbFloat1{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(40px,30px) scale(1.1)}}
        @keyframes orbFloat2{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(-30px,-40px) scale(.9)}}

        .wrap{position:relative;z-index:1;text-align:center;padding:20px;max-width:480px}
        /* 404 大字 */
        .code{
            font-size:clamp(7rem,22vw,12rem);font-weight:900;line-height:.9;
            background:linear-gradient(135deg,var(--accent) 0%,var(--accent-3) 50%,#c44eff 100%);
            -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
            letter-spacing:-.04em;position:relative;display:inline-block;
            animation:codeIn 1s var(--spring) both;
        }
        .code::after{
            content:'';position:absolute;left:50%;bottom:-8px;transform:translateX(-50%);
            width:60%;height:2px;border-radius:2px;
            background:linear-gradient(90deg,transparent,var(--accent),transparent);
            opacity:.6;
        }
        @keyframes codeIn{0%{opacity:0;transform:scale(.7) translateY(20px)}100%{opacity:1;transform:none}}
        /* 樱花图标 */
        .icon{
            font-size:2.5rem;margin-bottom:8px;display:inline-block;
            animation:iconFloat 3s ease-in-out infinite;
        }
        @keyframes iconFloat{0%,100%{transform:translateY(0) rotate(0)}50%{transform:translateY(-8px) rotate(8deg)}}
        /* 标题 */
        .title{
            font-size:1.3rem;font-weight:700;margin:24px 0 8px;
            animation:textIn .8s var(--ease) .2s both;
        }
        .desc{
            color:#d885a2;font-size:.95rem;line-height:1.7;margin-bottom:32px;
            animation:textIn .8s var(--ease) .35s both;
        }
        @keyframes textIn{0%{opacity:0;transform:translateY(12px)}100%{opacity:1;transform:none}}
        /* 按钮 */
        .btn{
            display:inline-flex;align-items:center;gap:8px;
            padding:14px 32px;border-radius:16px;
            background:linear-gradient(120deg,var(--accent),var(--accent-3));
            color:#1a0610;font-weight:700;text-decoration:none;font-size:.95rem;
            transition:transform .35s var(--spring),box-shadow .35s var(--ease);
            box-shadow:0 8px 24px -8px rgba(255,143,182,.4);
            animation:textIn .8s var(--ease) .5s both;
        }
        .btn:hover{transform:translateY(-4px) scale(1.05);box-shadow:0 16px 40px -8px rgba(255,143,182,.6)}
        .btn:active{transform:translateY(-1px) scale(1.02)}
        .btn svg{width:18px;height:18px}
        /* 装饰线 */
        .deco{
            position:fixed;z-index:0;pointer-events:none;opacity:.15;
        }
        .deco-tl{top:20px;left:20px;width:60px;height:60px;
            border-top:2px solid var(--accent);border-left:2px solid var(--accent);border-radius:8px 0 0 0}
        .deco-br{bottom:20px;right:20px;width:60px;height:60px;
            border-bottom:2px solid var(--accent);border-right:2px solid var(--accent);border-radius:0 0 8px 0}
    </style>
</head>
<body>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="deco deco-tl"></div>
    <div class="deco deco-br"></div>
    <div class="wrap">
        <div class="icon">🌸</div>
        <div class="code">404</div>
        <h1 class="title">迷失在樱花中</h1>
        <p class="desc">你寻找的页面不存在，可能已被移动或删除。<br>不如回到起点，重新出发。</p>
        <a href="/" class="btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
            返回首页
        </a>
    </div>
</body>
</html>
